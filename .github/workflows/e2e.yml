name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install darkhttpd
        run: |
          curl -sL https://github.com/ryanmjacobs/darkhttpd/releases/download/r2/darkhttpd-x86_64.deb -o darkhttpd.deb
          sudo dpkg -i darkhttpd.deb

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: |
          node node_modules/playwright/cli.js install chromium
          node node_modules/playwright/cli.js install-deps chromium

      - name: Run E2E tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 14

  deploy:
    needs: e2e
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
