<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <form id="taskForm">
      <input type="text" id="taskInput" placeholder="Enter task title" aria-label="Task title">
      <input type="date" id="startDate" aria-label="Start date">
      <input type="date" id="endDate" aria-label="End date">
      <select id="taskStatus" aria-label="Task status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <button id="addBtn" type="submit">Add</button>
    </form>
    <ul id="taskList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
