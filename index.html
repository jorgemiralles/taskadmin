<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <form id="taskForm">
      <input type="text" id="taskInput" placeholder="Enter task title" aria-label="Task title">
      <div class="form-row">
        <input type="date" id="startDate" aria-label="Start date">
        <select id="taskStatus" aria-label="Task status">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>
      <button id="addBtn" type="submit">Add</button>
    </form>
    <ul id="taskList"></ul>
  </div>
  <div id="confirmModal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <p>Are you sure you want to delete this task?</p>
      <div class="modal-actions">
        <button id="confirmDeleteBtn" class="confirm-delete-btn">Confirm</button>
        <button id="cancelDeleteBtn" class="cancel-delete-btn">Cancel</button>
      </div>
    </div>
  </div>
  <div id="editModal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <input type="text" id="editTitle" placeholder="Enter task title" aria-label="Task title">
      <input type="date" id="editStartDate" aria-label="Start date">
      <select id="editStatus" aria-label="Task status">
        <option value="pending">Pending</option>
        <option value="in-progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>
      <div class="modal-actions">
        <button id="saveEditBtn" class="save-edit-btn">Save</button>
        <button id="cancelEditBtn" class="cancel-edit-btn">Cancel</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
