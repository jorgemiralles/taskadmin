<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-4">
    <h1 class="mb-4 text-center">Task Manager</h1>
    <form id="taskForm">
      <input type="text" id="taskInput" class="form-control mb-2" placeholder="Enter task title" aria-label="Task title">
      <div class="row g-2 mb-2">
        <div class="col">
          <input type="date" id="startDate" class="form-control" aria-label="Start date">
        </div>
      </div>
      <button id="addBtn" class="btn btn-success w-100" type="submit">Add</button>
    </form>
    <div class="row mt-4" id="kanbanBoard">
      <div class="col-md-4">
        <div class="kanban-zone" data-status="pending">
          <h5 class="column-header status-pending-header">Pending</h5>
          <ul id="pendingColumn" class="kanban-column list-group"></ul>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-zone" data-status="in-progress">
          <h5 class="column-header status-in-progress-header">In Progress</h5>
          <ul id="inProgressColumn" class="kanban-column list-group"></ul>
        </div>
      </div>
      <div class="col-md-4">
        <div class="kanban-zone" data-status="completed">
          <h5 class="column-header status-completed-header">Completed</h5>
          <ul id="completedColumn" class="kanban-column list-group"></ul>
        </div>
      </div>
    </div>
  </div>
  <div id="confirmModal" class="modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p>Are you sure you want to delete this task?</p>
        </div>
        <div class="modal-footer">
          <button id="confirmDeleteBtn" class="btn btn-danger">Confirm</button>
          <button id="cancelDeleteBtn" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <div id="editModal" class="modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="editTitle" class="form-control mb-2" placeholder="Enter task title" aria-label="Task title">
          <input type="date" id="editStartDate" class="form-control mb-2" aria-label="Start date">
          <select id="editStatus" class="form-select mb-2" aria-label="Task status">
            <option value="pending">Pending</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="modal-footer">
          <button id="saveEditBtn" class="btn btn-success">Save</button>
          <button id="cancelEditBtn" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
